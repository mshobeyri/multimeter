<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="needleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
  </defs>
  <!-- Rounded square bg -->
  <rect width="40" height="40" rx="10" fill="url(#logoGrad)"/>
  <!-- Meter arc -->
  <path d="M10 28 A12 12 0 0 1 30 28" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.35"/>
  <!-- Tick marks on the arc -->
  <line x1="10.5" y1="27" x2="12.5" y2="25" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="13" y1="21" x2="15" y2="22" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="20" y1="16" x2="20" y2="18.5" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="27" y1="21" x2="25" y2="22" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="29.5" y1="27" x2="27.5" y2="25" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Needle pointing to the right (good/pass) -->
  <line x1="20" y1="28" x2="27" y2="20" stroke="url(#needleGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="20" cy="28" r="2.5" fill="white"/>
  <!-- Code brackets at top -->
  <text x="12" y="13" font-family="monospace" font-size="8" font-weight="bold" fill="white" opacity="0.7">&lt;/&gt;</text>
</svg>
