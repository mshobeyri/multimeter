<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="dial" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Body -->
  <rect width="120" height="120" rx="26" fill="url(#bg)"/>

  <!-- Meter face (dark circle) -->
  <circle cx="60" cy="52" r="34" fill="url(#dial)" stroke="white" stroke-width="1.5" stroke-opacity="0.2"/>

  <!-- Scale arc markings -->
  <path d="M32 68 A32 32 0 0 1 88 68" stroke="white" stroke-width="1" stroke-opacity="0.15" fill="none"/>
  <path d="M36 62 A28 28 0 0 1 84 62" stroke="white" stroke-width="1.2" stroke-opacity="0.25" fill="none"/>
  <path d="M40 56 A24 24 0 0 1 80 56" stroke="white" stroke-width="1" stroke-opacity="0.15" fill="none"/>

  <!-- Tick marks around the arc -->
  <line x1="33" y1="65" x2="37" y2="61" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="37" y1="55" x2="41" y2="52.5" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="44" y1="42" x2="47.5" y2="44" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="57" y1="35" x2="57" y2="39" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="63" y1="35" x2="63" y2="39" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="76" y1="42" x2="72.5" y2="44" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="83" y1="55" x2="79" y2="52.5" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="87" y1="65" x2="83" y2="61" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Colored zones on the arc: red > yellow > green -->
  <path d="M36 62 A28 28 0 0 1 48 44" stroke="#f87171" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M48 44 A28 28 0 0 1 60 38" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M60 38 A28 28 0 0 1 84 62" stroke="#4ade80" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.8"/>

  <!-- Needle pointing to the green zone -->
  <line x1="60" y1="68" x2="78" y2="44" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Needle center pivot -->
  <circle cx="60" cy="68" r="3.5" fill="white"/>
  <circle cx="60" cy="68" r="1.5" fill="#06b6d4"/>

  <!-- Display text -->
  <text x="60" y="82" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="white" opacity="0.6">mmt</text>

  <!-- Bottom probe connectors -->
  <circle cx="44" cy="102" r="6" fill="none" stroke="#f87171" stroke-width="2.5" opacity="0.8"/>
  <circle cx="44" cy="102" r="2" fill="#f87171" opacity="0.8"/>
  <circle cx="60" cy="102" r="6" fill="none" stroke="#fbbf24" stroke-width="2.5" opacity="0.8"/>
  <circle cx="60" cy="102" r="2" fill="#fbbf24" opacity="0.8"/>
  <circle cx="76" cy="102" r="6" fill="none" stroke="#4ade80" stroke-width="2.5" opacity="0.8"/>
  <circle cx="76" cy="102" r="2" fill="#4ade80" opacity="0.8"/>
</svg>
