<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Environment Variables</title>
    <style>
        :root {
            --table-font-size: 12px;
            --table-header-font-size: 11px;
            --cell-height: 28px;
            --cell-padding-x: 8px;
            --panel-radius: 6px;
        }

        .section-card {
            padding: 0;
            margin-bottom: 16px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            margin: 0;
        }

        .section-subtitle {
            font-size: 11px;
            color: var(--description-foreground);
            margin: 2px 0 0 0;
        }

        .button-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .preset-section {
            display: none;
            flex-direction: column;
            gap: 8px;
        }

        .preset-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 10px;
            border-radius: 4px;
            background-color: transparent;
            transition: border-color 0.2s ease, background-color 0.2s ease;
        }

        .preset-row-applied {
            border-color: var(--status-enabled);
            background-color: rgba(40, 167, 69, 0.08);
        }

        .preset-name {
            font-weight: 600;
            flex: 0 0 150px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .preset-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }

        .table-wrapper {
            border: 1px solid var(--panel-border);
            border-radius: 4px;
            overflow: hidden;
            display: none;
        }

        .env-table {
            width: 100%;
            border-collapse: collapse;
            font-size: var(--table-font-size);
        }

        .env-table thead {
            background-color: rgba(255, 255, 255, 0.03);
        }

        .env-table th {
            text-align: left;
            font-size: var(--table-header-font-size);
            color: var(--description-foreground);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 6px var(--cell-padding-x);
            border-bottom: 1px solid var(--panel-border);
        }

        .env-table td {
            padding: 6px var(--cell-padding-x);
            border-bottom: 1px solid var(--panel-border);
            vertical-align: middle;
        }

        .env-table tr:last-child td {
            border-bottom: none;
        }

        .env-name {
            font-weight: 600;
        }

        .env-value {
            font-family: var(--vscode-editor-fontFamily, monospace);
            color: var(--vscode-symbolIcon-stringForeground, var(--foreground));
        }

        .flat-select {
            border: 1px solid var(--input-border);
            background: var(--input-background);
            color: var(--input-foreground);
            font: inherit;
            padding: 4px 8px;
            border-radius: 2px;
            width: 100%;
            height: var(--cell-height);
            box-sizing: border-box;
            appearance: none;
            -webkit-appearance: none;
        }

        .flat-select:focus {
            outline: 1px solid var(--vscode-focusBorder);
        }

        .empty-state {
            display: none;
            text-align: center;
            padding: 20px;
            color: var(--description-foreground);
            font-size: 12px;
            font-style: italic;
            border: 1px dashed var(--input-border);
            border-radius: 4px;
            margin-top: 12px;
        }

        .value-input {
            border: 1px solid transparent;
            background: transparent;
            color: var(--vscode-symbolIcon-stringForeground, var(--foreground));
            font-family: var(--vscode-editor-fontFamily, monospace);
            font-size: var(--table-font-size);
            padding: 4px 8px;
            border-radius: 2px;
            width: 100%;
            height: var(--cell-height);
            box-sizing: border-box;
        }

        .value-input:hover {
            border-color: var(--input-border);
        }

        .value-input:focus {
            outline: 1px solid var(--vscode-focusBorder);
            border-color: var(--input-border);
            background: var(--input-background);
        }

        .actions {
            display: flex;
            justify-content: flex-end;
        }

        .icon-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            padding: 0;
            border: none;
            background: transparent;
            color: var(--foreground);
            cursor: pointer;
            border-radius: 4px;
            opacity: 0.7;
        }

        .icon-button:hover {
            background: var(--vscode-toolbar-hoverBackground, rgba(90, 93, 94, 0.31));
            opacity: 1;
        }

        .delete-btn {
            opacity: 0.5;
        }

        .delete-btn:hover {
            opacity: 1;
            color: var(--vscode-errorForeground, #f48771);
        }

        .env-actions {
            width: 32px;
            min-width: 32px;
            max-width: 32px;
            text-align: center;
            padding: 0 8px 0 0!important;
        }

        .add-env-row {
            display: none;
            padding: 8px;
            border: 1px solid var(--panel-border);
            border-radius: 4px;
            margin-bottom: 12px;
            gap: 8px;
            align-items: center;
        }

        .add-env-input {
            border: 1px solid var(--input-border);
            background: var(--input-background);
            color: var(--input-foreground);
            font: inherit;
            padding: 4px 8px;
            border-radius: 2px;
            height: var(--cell-height);
            box-sizing: border-box;
            flex: 1;
        }

        .add-env-input:focus {
            outline: 1px solid var(--vscode-focusBorder);
        }

        .add-env-btn {
            border: 1px solid var(--input-border);
            background: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
            font: inherit;
            padding: 4px 12px;
            border-radius: 2px;
            height: var(--cell-height);
            cursor: pointer;
        }

        .add-env-btn:hover {
            background: var(--vscode-button-hoverBackground);
        }

        .cancel-btn {
            border: 1px solid var(--input-border);
            background: transparent;
            color: var(--foreground);
            font: inherit;
            padding: 4px 12px;
            border-radius: 2px;
            height: var(--cell-height);
            cursor: pointer;
        }

        .cancel-btn:hover {
            background: var(--vscode-toolbar-hoverBackground, rgba(90, 93, 94, 0.31));
        }

        /* Enable horizontal scrolling when panel is narrow */
        @media (max-width: 400px) {
            body {
                overflow-x: auto;
                min-width: 400px;
            }
        }
    </style>
</head>

<body>
    <div class="section-card">
        <div class="section-header">
            <div>
                <div class="section-title">Presets</div>
            </div>
        </div>
        <div id="preset-section" class="preset-section"></div>
        <div id="preset-empty" class="empty-state">No presets found in the current environment file.</div>
    </div>

    <div class="section-card">
        <div class="section-header">
            <div>
                <div class="section-title">Environment Variables</div>
            </div>
            <div class="button-group">
                <button id="add-env-btn" class="icon-button" title="Add variable">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                        <path d="M14 7v1H8v6H7V8H1V7h6V1h1v6h6z"/>
                    </svg>
                </button>
            </div>
        </div>
        <div id="add-env-row" class="add-env-row">
            <input type="text" id="add-env-name" class="add-env-input" placeholder="Variable name" />
            <input type="text" id="add-env-value" class="add-env-input" placeholder="Value" />
            <button id="confirm-add-env" class="add-env-btn">Add</button>
            <button id="cancel-add-env" class="cancel-btn">Cancel</button>
        </div>
        <div id="env-table-container" class="table-wrapper">
            <table class="env-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Label</th>
                        <th>Value</th>
                        <th class="env-actions" style="width: 32px;"></th>
                    </tr>
                </thead>
                <tbody id="env-table-body"></tbody>
            </table>
        </div>
        <div id="empty-state" class="empty-state">No environment variables saved in workspace.</div>
    </div>

    <script>
        const vscode = acquireVsCodeApi();
        let environmentVars = [];
        let environmentPresets = {};
        const presetSelections = {};

        window.addEventListener('message', event => {
            const message = event.data;
            if (message.command === 'multimeter.environment.panel.refresh') {
                environmentVars = message.data || [];
                environmentPresets = message.presets || {};
                updateUI();
                renderPresets();
            }
        });

        function updateUI() {
            const tableContainer = document.getElementById('env-table-container');
            const emptyState = document.getElementById('empty-state');
            const tableBody = document.getElementById('env-table-body');

            if (!environmentVars || environmentVars.length === 0) {
                tableContainer.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            tableContainer.style.display = 'block';
            emptyState.style.display = 'none';
            tableBody.innerHTML = '';

            environmentVars.forEach((envVar, index) => {
                const row = document.createElement('tr');
                row.className = 'env-row';

                const isManual = envVar.isManual === true;
                let optionsHtml = '';
                if (isManual) {
                    optionsHtml = `<option value="__manual__" selected disabled>Manual</option>`;
                    if (Array.isArray(envVar.options) && envVar.options.length > 0) {
                        optionsHtml += envVar.options.map(opt =>
                            `<option value="${escapeHtml(String(opt.label))}" data-opt-value="${escapeHtml(String(opt.value))}">${escapeHtml(String(opt.label))}</option>`
                        ).join('');
                    }
                } else if (Array.isArray(envVar.options) && envVar.options.length > 0) {
                    optionsHtml = envVar.options.map(opt =>
                        `<option value="${escapeHtml(String(opt.label))}" data-opt-value="${escapeHtml(String(opt.value))}"${envVar.label === opt.label ? ' selected' : ''}>${escapeHtml(String(opt.label))}</option>`
                    ).join('');
                } else {
                    optionsHtml = `<option value="${escapeHtml(String(envVar.label || envVar.name))}" selected>${escapeHtml(String(envVar.label || envVar.name))}</option>`;
                }

                row.innerHTML = `
                    <td class="env-name">${escapeHtml(envVar.name)}</td>
                    <td>
                        <select class="flat-select env-select" data-index="${index}">
                            ${optionsHtml}
                        </select>
                    </td>
                    <td class="env-value">
                        <input type="text" class="value-input" data-index="${index}" value="${escapeHtml(String(envVar.value ?? ''))}" />
                    </td>
                    <td class="env-actions">
                        <button class="icon-button delete-btn" data-index="${index}" title="Delete variable">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                                <path fill-rule="evenodd" clip-rule="evenodd" d="M10 3h3v1h-1v9l-1 1H4l-1-1V4H2V3h3V2a1 1 0 0 1 1-1h3a1 1 0 0 1 1 1v1zM9 2H6v1h3V2zM4 13h7V4H4v9zm2-8H5v7h1V5zm1 0h1v7H7V5zm2 0h1v7H9V5z"/>
                            </svg>
                        </button>
                    </td>
                `;
                tableBody.appendChild(row);
            });

            registerEnvSelectHandlers();
        }

        function registerEnvSelectHandlers() {
            document.querySelectorAll('.env-select').forEach(select => {
                select.addEventListener('change', function () {
                    const idx = this.getAttribute('data-index');
                    const optLabel = this.value;
                    const selectedOption = this.options[this.selectedIndex];
                    const optValue = selectedOption.getAttribute('data-opt-value');
                    const envVar = environmentVars[idx];
                    envVar.label = optLabel;
                    envVar.isManual = false;
                    if (typeof optValue !== 'undefined') {
                        envVar.value = optValue;
                    }
                    updateUI();
                    vscode.postMessage({
                        type: 'multimeter.environment.set',
                        name: envVar.name,
                        value: optValue,
                        label: optLabel,
                        isManual: false
                    });
                });
            });

            document.querySelectorAll('.value-input').forEach(input => {
                input.addEventListener('change', function () {
                    const idx = this.getAttribute('data-index');
                    const newValue = this.value;
                    const envVar = environmentVars[idx];
                    envVar.value = newValue;
                    envVar.label = 'Manual';
                    envVar.isManual = true;
                    updateUI();
                    vscode.postMessage({
                        type: 'multimeter.environment.set',
                        name: envVar.name,
                        value: newValue,
                        label: 'Manual',
                        isManual: true
                    });
                });
            });

            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', function () {
                    const idx = this.getAttribute('data-index');
                    const envVar = environmentVars[idx];
                    vscode.postMessage({
                        type: 'multimeter.environment.delete',
                        name: envVar.name
                    });
                });
            });
        }

        function renderPresets() {
            const presetSection = document.getElementById('preset-section');
            const presetEmpty = document.getElementById('preset-empty');
            if (!presetSection || !presetEmpty) {
                return;
            }

            const presetEntries = Object.entries(environmentPresets || {});
            presetSection.innerHTML = '';

            if (presetEntries.length === 0) {
                presetSection.style.display = 'none';
                presetEmpty.style.display = 'block';
                return;
            }

            presetSection.style.display = 'flex';
            presetEmpty.style.display = 'none';

            const validPresetNames = new Set(presetEntries.map(([name]) => name));
            Object.keys(presetSelections).forEach(key => {
                if (!validPresetNames.has(key)) {
                    delete presetSelections[key];
                }
            });

            presetEntries.forEach(([presetName, presetGroup]) => {
                const envNames = Object.keys(presetGroup || {});
                if (envNames.length === 0) {
                    return;
                }

                const row = document.createElement('div');
                row.className = 'preset-row';

                const label = document.createElement('div');
                label.className = 'preset-name';
                label.textContent = presetName;

                const controls = document.createElement('div');
                controls.className = 'preset-controls';

                const select = document.createElement('select');
                select.className = 'flat-select preset-select';
                const placeholder = document.createElement('option');
                placeholder.value = '';
                placeholder.textContent = 'Select environment';
                placeholder.disabled = true;
                placeholder.selected = true;
                select.appendChild(placeholder);

                envNames.forEach(envName => {
                    const option = document.createElement('option');
                    option.value = envName;
                    option.textContent = envName;
                    select.appendChild(option);
                });

                const savedSelection = presetSelections[presetName];
                if (savedSelection && envNames.includes(savedSelection)) {
                    select.value = savedSelection;
                }

                select.addEventListener('change', () => {
                    const envName = select.value;
                    if (!envName) {
                        delete presetSelections[presetName];
                        return;
                    }
                    presetSelections[presetName] = envName;
                    vscode.postMessage({
                        type: 'multimeter.environment.applyPreset',
                        presetName,
                        envName
                    });
                    row.classList.add('preset-row-applied');
                    setTimeout(() => {
                        row.classList.remove('preset-row-applied');
                    }, 1000);
                });

                controls.appendChild(select);

                row.appendChild(label);
                row.appendChild(controls);
                presetSection.appendChild(row);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function requestRefresh() {
            vscode.postMessage({ type: 'refresh' });
        }

        document.getElementById('preset-refresh')?.addEventListener('click', requestRefresh);
        document.getElementById('clear-environments')?.addEventListener('click', () => {
            vscode.postMessage({ type: 'multimeter.environment.clear' });
        });

        document.getElementById('add-env-btn')?.addEventListener('click', () => {
            const addRow = document.getElementById('add-env-row');
            addRow.style.display = 'flex';
            document.getElementById('add-env-name').value = '';
            document.getElementById('add-env-value').value = '';
            document.getElementById('add-env-name').focus();
        });

        document.getElementById('cancel-add-env')?.addEventListener('click', () => {
            document.getElementById('add-env-row').style.display = 'none';
        });

        document.getElementById('confirm-add-env')?.addEventListener('click', () => {
            const nameInput = document.getElementById('add-env-name');
            const valueInput = document.getElementById('add-env-value');
            const name = nameInput.value.trim();
            const value = valueInput.value;
            if (!name) {
                nameInput.focus();
                return;
            }
            vscode.postMessage({
                type: 'multimeter.environment.add',
                name: name,
                value: value,
                label: 'Manual',
                isManual: true
            });
            document.getElementById('add-env-row').style.display = 'none';
        });

        document.getElementById('add-env-name')?.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('add-env-value').focus();
            } else if (e.key === 'Escape') {
                document.getElementById('add-env-row').style.display = 'none';
            }
        });

        document.getElementById('add-env-value')?.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('confirm-add-env').click();
            } else if (e.key === 'Escape') {
                document.getElementById('add-env-row').style.display = 'none';
            }
        });

        requestRefresh();
    </script>
</body>

</html>
