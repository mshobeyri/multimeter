<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@vscode/codicons@0.0.35/dist/codicon.css">
  <style>
    :root {
      --mmt-gap-6: 6px;
      --mmt-gap-8: 8px;
      --mmt-gap-12: 12px;
      --mmt-gap-16: 16px;
      --mmt-gap-20: 20px;
    }

    .section {
      padding: var(--mmt-gap-12);
    }

    .label {
      display: block;
      margin-bottom: var(--mmt-gap-6);
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: var(--mmt-gap-8);
    }

    .mb-12 {
      margin-bottom: var(--mmt-gap-20);
    }

    .mt-8 {
      margin-top: var(--mmt-gap-12);
    }

    .mt-12 {
      margin-top: var(--mmt-gap-16);
    }

    .mb-8 {
      margin-bottom: var(--mmt-gap-12);
    }

    .gap-8 {
      gap: var(--mmt-gap-12);
    }

    .input,
    .textarea {
      margin-bottom: 0;
    }

    #runBtn {
      margin-top: var(--mmt-gap-16);
    }

    .file-picker-container {
      position: relative;
      width: 100%;
    }

    .file-picker-input {
      width: 100%;
      padding-right: 36px !important;
    }

    .file-picker-button {
      position: absolute;
      right: 4px;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--vscode-foreground);
      opacity: 0.8;
    }

    .file-picker-button:hover {
      opacity: 1;
    }

    .file-picker-button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Enable horizontal scrolling when panel is narrow */
    @media (max-width: 300px) {
      body {
        overflow-x: auto;
        min-width: 300px;
      }
    }
  </style>
</head>

<body>
  <div class="section">
    <div class="mb-12">
      <label class="label" for="serverType">Server Type</label>
      <select id="serverType" class="input" ${disabled}>
        <option value="http" ${httpSelected}>HTTP</option>
        <option value="https" ${httpsSelected}>HTTPS</option>
        <option value="ws" ${wsSelected}>WebSocket</option>
        <option value="mmt" ${mmtSelected}>MMT Mock Server</option>
      </select>
    </div>

    <div class="mb-12" id="mmtSection" ${mmtSectionHidden}>
      <label class="label">Server file (.mmt)</label>
      <div class="file-picker-container">
        <input id="mmtFilePath" class="input file-picker-input" type="text" value="${mmtFilePath}" ${disabled} placeholder="Select a .mmt server file" />
        <button id="pickMmtServerFile" class="file-picker-button" ${disabled} title="Choose file">
          <span class="codicon codicon-folder-opened"></span>
        </button>
      </div>
    </div>

    <div class="mb-12" id="httpsSection" ${httpsSectionHidden}>
      <label class="label">Server certificate</label>
      <div class="flex gap-8">
        <input id="httpsCertPath" class="input flex-1" type="text" value="${httpsCertPath}" readonly />
        <button id="pickHttpsCert" class="button" ${disabled} title="Choose certificate">
          <span class="codicon codicon-folder-opened"></span>
        </button>
      </div>

      <label class="label mt-8">Server key</label>
      <div class="flex gap-8">
        <input id="httpsKeyPath" class="input flex-1" type="text" value="${httpsKeyPath}" readonly />
        <button id="pickHttpsKey" class="button" ${disabled} title="Choose key">
          <span class="codicon codicon-folder-opened"></span>
        </button>
      </div>

      <label class="mb-8 mt-12 checkbox-label">
        <input id="httpsRequestCert" type="checkbox" ${httpsRequestCertChecked} ${disabled}>
        Require client certificate (mTLS)
      </label>

      <label class="label mt-8">Client CA (for mTLS)</label>
      <div class="flex gap-8">
        <input id="httpsClientCaPath" class="input flex-1" type="text" value="${httpsClientCaPath}" readonly />
        <button id="pickHttpsClientCa" class="button" ${disabled} title="Choose Client CA">
          <span class="codicon codicon-folder-opened"></span>
        </button>
      </div>
    </div>

    <div class="flex gap-8 mb-12" id="portStatusSection" style="${simpleMockSectionStyle}">
      <div class="flex-1">
        <label class="label" for="port">Port</label>
        <input id="port" class="input" type="number" min="1" max="65535" value="${port}" ${disabled} />
      </div>
      <div class="flex-1">
        <label class="label" for="statusCode">Status</label>
        <input id="statusCode" class="input" type="number" min="100" max="599" value="${statusCode}" />
      </div>
    </div>

    <div id="simpleMockOptionsSection" style="${simpleMockSectionStyle}">
      <label class="mb-12 checkbox-label">
        <input id="reflect" type="checkbox" ${reflectChecked}>
        Reflect request as response
      </label>

      <label class="mb-12 checkbox-label">
        <input id="cors" type="checkbox" ${corsChecked}>
        Allow CORS requests
      </label>

      <label class="mb-12 checkbox-label">
        <input id="logHistory" type="checkbox" ${logHistoryChecked}>
        Log to History
      </label>
    </div>

    <div class="mb-12" id="responseSection" ${responseSectionHidden}>
      <label class="label" for="response">Response</label>
      <textarea id="response" class="textarea" ${responseDisabled}>${response}</textarea>
    </div>

    <button id="runBtn" class="button" data-running="${isRunning}">
      <span class="${buttonIcon}"></span>
      ${buttonText}
    </button>
  </div>

  <script>
    const vscode = acquireVsCodeApi();

    document.querySelector('#serverType').onchange = e => {
      vscode.postMessage({ type: 'setType', value: e.target.value });
    };

    document.querySelector('#pickHttpsCert').onclick = () => {
      vscode.postMessage({ type: 'pickHttpsCert' });
    };

    document.querySelector('#pickHttpsKey').onclick = () => {
      vscode.postMessage({ type: 'pickHttpsKey' });
    };

    document.querySelector('#pickHttpsClientCa').onclick = () => {
      vscode.postMessage({ type: 'pickHttpsClientCa' });
    };

    document.querySelector('#pickMmtServerFile').onclick = () => {
      vscode.postMessage({ type: 'pickMmtServerFile' });
    };

    document.querySelector('#mmtFilePath').onchange = e => {
      vscode.postMessage({ type: 'setMmtServerFile', value: e.target.value });
    };

    document.querySelector('#httpsRequestCert').onchange = e => {
      vscode.postMessage({ type: 'setHttpsRequestCert', value: e.target.checked });
    };

    document.querySelector('#port').onchange = e => {
      vscode.postMessage({ type: 'setPort', value: e.target.value });
    };

    document.getElementById('statusCode').onchange = e => {
      vscode.postMessage({ type: 'setStatusCode', value: e.target.value });
    };

    document.querySelector('#reflect').onchange = e => {
      vscode.postMessage({ type: 'setReflect', value: e.target.checked });
      // Disable/enable response textarea based on reflect
      document.getElementById('response').disabled = e.target.checked;
    };

    document.querySelector('#cors').onchange = e => {
      vscode.postMessage({ type: 'setCors', value: e.target.checked });
    };

    document.querySelector('#logHistory').onchange = e => {
      vscode.postMessage({ type: 'setLogHistory', value: e.target.checked });
    };

    document.querySelector('#response').oninput = e => {
      vscode.postMessage({ type: 'setResponse', value: e.target.value });
    };

    document.querySelector('#runBtn').onclick = () => {
      const runBtn = document.getElementById('runBtn');
      const running = runBtn?.dataset?.running === 'true';
      if (running) {
        vscode.postMessage({ type: 'stopServer' });
      } else {
        vscode.postMessage({ type: 'startServer' });
      }
    };
  </script>
</body>

</html>
